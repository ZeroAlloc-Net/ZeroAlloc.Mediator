name: CI

on:
  push:
    branches: [main, 'release-please--**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Run GitVersion
        id: gitversion
        run: |
          VERSION=$(dotnet gitversion /showvariable SemVer)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release -p:Version=${{ steps.gitversion.outputs.version }}

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

      - name: Pack
        run: |
          dotnet pack src/ZeroAlloc.Mediator/ZeroAlloc.Mediator.csproj --no-build -c Release -p:PackageVersion=${{ steps.gitversion.outputs.version }} -o ./artifacts
          dotnet pack src/ZeroAlloc.Mediator.Generator/ZeroAlloc.Mediator.Generator.csproj --no-build -c Release -p:PackageVersion=${{ steps.gitversion.outputs.version }} -o ./artifacts

      - name: Verify generator pack layout
        run: bash scripts/verify-generator-pack-layout.sh ./artifacts

      - name: Push to NuGet (pre-release)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  aot-smoke:
    runs-on: ubuntu-latest
    # Publishes samples/ZeroAlloc.Mediator.AotSmoke with PublishAot=true and runs
    # the binary. Exercises all three dispatch shapes the generator emits — Send,
    # Publish, and CreateStream.
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install AOT native toolchain
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore samples/ZeroAlloc.Mediator.AotSmoke/ZeroAlloc.Mediator.AotSmoke.csproj

      - name: Publish AOT
        run: dotnet publish samples/ZeroAlloc.Mediator.AotSmoke/ZeroAlloc.Mediator.AotSmoke.csproj -r linux-x64 -c Release -o ./aot-out

      - name: Run AOT binary
        run: ./aot-out/ZeroAlloc.Mediator.AotSmoke

  api-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install ApiCompat tool
        run: dotnet tool install --global Microsoft.DotNet.ApiCompat.Tool
      - name: Build current (sentinel assembly version >= any baseline so CP0003 never fires)
        run: dotnet build src/ZeroAlloc.Mediator/ZeroAlloc.Mediator.csproj -c Release -p:Version=9999.0.0 -p:AssemblyVersion=9999.0.0.0 -p:FileVersion=9999.0.0.0
      - name: Pack current
        run: dotnet pack src/ZeroAlloc.Mediator/ZeroAlloc.Mediator.csproj -c Release --no-build --output ./current -p:Version=9999.0.0 -p:AssemblyVersion=9999.0.0.0 -p:FileVersion=9999.0.0.0
      - name: Compare against latest published 1.x
        run: |
          latest=$(curl -s https://api.nuget.org/v3-flatcontainer/zeroalloc.mediator/index.json \
                   | jq -r '.versions[]' | grep -E '^1\.' | tail -1)
          if [ -z "$latest" ]; then
            echo "No published 1.x yet — skipping baseline check."
            exit 0
          fi
          mkdir -p ./baseline
          curl -sL "https://api.nuget.org/v3-flatcontainer/zeroalloc.mediator/$latest/zeroalloc.mediator.$latest.nupkg" \
               -o ./baseline/baseline.nupkg
          apicompat package ./current/*.nupkg --baseline-package ./baseline/baseline.nupkg
